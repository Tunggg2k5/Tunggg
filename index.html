<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Album Người Yêu 💖</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#ffd6e7,#ffeef5);
      min-height:100vh;
      padding:30px;
    }

    h1{
      text-align:center;
      color:#ff3f81;
      margin-bottom:25px;
      font-size:40px;
    }

    .upload-box{
      display:flex;
      justify-content:center;
      margin-bottom:30px;
    }

    label{
      background:#ff4f93;
      color:white;
      padding:14px 28px;
      border-radius:15px;
      cursor:pointer;
      font-size:18px;
      transition:0.3s;
    }

    label:hover{
      background:#ff2675;
      transform:scale(1.05);
    }

    input{
      display:none;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .caption{
      padding:12px;
      text-align:center;
      color:#555;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <h1>💖 Album Người Yêu 💖</h1>

  <div class="upload-box">
    <label>
      📸 Upload Ảnh
      <input type="file" multiple accept="image/*" id="upload">
    </label>
  </div>

  <div class="gallery" id="gallery"></div>

  <script>
    const upload = document.getElementById("upload");
    const gallery = document.getElementById("gallery");

    upload.addEventListener("change", function () {
      const files = this.files;

      for (let file of files) {
        const reader = new FileReader();

        reader.onload = function (e) {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${e.target.result}">
            <div class="caption">${file.name}</div>
          `;

          gallery.appendChild(card);
        };

        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
